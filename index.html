<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mike's Pac-Man</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <div id="canvasWrap">
            <canvas id="gameCanvas"></canvas>
            <div id="ui"></div>
            <div id="initialsOverlay">
                <div id="initialsForm">
                    <div id="initialsTitle">NEW HIGH SCORE!</div>
                    <div id="initialsScoreDisplay"></div>
                    <label for="initialsInput">ENTER YOUR INITIALS</label>
                    <input id="initialsInput" type="text" maxlength="3"
                           autocomplete="off" autocorrect="off"
                           autocapitalize="characters" spellcheck="false"
                           inputmode="text" enterkeyhint="done"
                           placeholder="AAA">
                    <div id="initialsTapHint">TAP ABOVE TO TYPE</div>
                    <button id="initialsSubmit" disabled>SAVE SCORE ▶</button>
                </div>
            </div>
        </div>
        <div id="touchControls">
            <div id="dpad">
                <button id="btnUp"    class="dpad-btn" data-dir="up">▲</button>
                <button id="btnLeft"  class="dpad-btn" data-dir="left">◀</button>
                <button id="btnRight" class="dpad-btn" data-dir="right">▶</button>
                <button id="btnDown"  class="dpad-btn" data-dir="down">▼</button>
            </div>
            <div id="actionBtns">
                <button id="btnStart" class="action-btn">START</button>
                <button id="btnPause" class="action-btn">⏸ PAUSE</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
